<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Medical Results - Wafid Booking</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:white;
    color:black;
    min-height:100vh;
    padding-top:80px;
}

/* ===== SAME PREMIUM DARK HEADER (FIRST FILE) ===== */
.header {
    background: #0f172a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    padding: 1rem 2rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo img {
    height: 40px;
    filter: brightness(0) invert(1);
}

.nav-menu {
    display: none;
    position: fixed;
    top: 80px;
    left: 0;
    width: 100%;
    background: #0f172a;
    flex-direction: column;
    padding: 2rem;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    list-style: none;
}

.nav-menu.active {
    display: flex;
}

.nav-menu a {
    text-decoration: none;
    color: #e5e7eb;
    font-weight: 500;
    padding: 1rem 0;
    transition: all 0.3s ease;
}

.nav-menu a.active,
.nav-menu a:hover {
    color: #ffffff;
    padding-left: 8px;
}

.hamburger {
    display: flex;
    flex-direction: column;
    cursor: pointer;
    gap: 4px;
}

.hamburger span {
    width: 25px;
    height: 3px;
    background: white;
}

/* ===== PAGE ===== */
.container{
    max-width:600px;
    margin:auto;
    padding:20px;
    text-align:center;
}

.form-card{
    background:white;
    border:1px solid #eee;
    border-radius:15px;
    padding:25px;
    margin-top:20px;
}

.page-icon{
    font-size:40px;
    margin-bottom:10px;
}

.page-title{
    font-size:28px;
    margin-bottom:10px;
}

.page-subtitle{
    color:#555;
    margin-bottom:20px;
}

.form-group{
    text-align:left;
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-top:5px;
}

button{
    width:100%;
    padding:12px;
    background:black;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

.support-note{
    margin-top:15px;
    background:#f5f5f5;
    padding:10px;
    border-radius:8px;
    font-size:14px;
}

.disclaimer{
    margin-top:20px;
    font-size:13px;
    color:#666;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header class="header">
    <div class="nav-container">

        <div class="logo">
            <a href="index.html"><img src="logo.jpg" alt="Logo"></a>
        </div>

        <nav>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="booking.html">Book Appointment</a></li>
                <li><a href="results.html" class="active">Medical Results</a></li>
                <li><a href="centers.html">Appointment Centers</a></li>
            </ul>
        </nav>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>

    </div>
</header>

<!-- ===== CONTENT ===== -->
<div class="container">

    <div class="form-card">

        <div class="page-icon">📄</div>
        <div class="page-title">Check Medical Results</div>
        <div class="page-subtitle">Enter your details below</div>

        <form id="form">

            <div class="form-group">
                <label>Passport Number *</label>
                <input type="text" id="passport" placeholder="Enter passport number">
            </div>

            <div class="form-group">
                <label>Nationality</label>
                <select>
                    <option>Pakistan</option>
                </select>
            </div>

            <button type="submit">Check Results</button>

        </form>

        <div class="support-note">
            We will send results on WhatsApp
        </div>

    </div>

    <div class="disclaimer">
        Disclaimer: We are not affiliated with Wafid.
    </div>

</div>

<script>
function toggleMenu(){
    document.getElementById("navMenu").classList.toggle("active");
}

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let pass = document.getElementById("passport").value;

    if(!pass){
        alert("Enter passport number");
        return;
    }

    let msg = "Medical Result Request:\nPassport: " + pass;

    window.open("https://wa.me/923338181082?text=" + encodeURIComponent(msg));
});
</script>

</body>
</html>
